name: KSP Shodhana CI/CD Automated Quality Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  backend-test:
    name: Spring Boot Backend Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Run Spring Boot Test Suite
        run: |
          cd backend
          mvn clean test -Dtest="!*IntegrationTest"

  ai-service-test:
    name: FastAPI AI Service Guardrails & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies & Run Pytest
        run: |
          cd ai-service
          pip install -r requirements.txt
          pytest

  frontend-build:
    name: Next.js Presentation UI Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies & Run Build Check
        run: |
          cd frontend
          npm ci
          npm run build
