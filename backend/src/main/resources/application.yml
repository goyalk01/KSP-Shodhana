server:
  port: 8080

spring:
  application:
    name: ksp-shodhana-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:demo}

  # JPA & PostgreSQL DataSource (Production Profile)
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ksp_shodhana}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.spatial.dialect.postgis.PostgisDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  # Flyway Migration Configuration
  flyway:
    enabled: false
    locations: classpath:db/migration

  # Auto-configuration exclusions for zero-dependency demo mode
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

# === Catalyst Configuration ===
catalyst:
  project-id: ${CATALYST_PROJECT_ID:}
  environment: ${CATALYST_ENV:development}

# === AI Service Configuration ===
ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:8000}
  timeout-ms: ${AI_SERVICE_TIMEOUT:30000}

# === CORS Configuration ===
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"

# === Logging ===
logging:
  level:
    com.ksp.shodhana: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
