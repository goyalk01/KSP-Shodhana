server:
  port: 8080

spring:
  application:
    name: ksp-shodhana-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:demo}

  # JPA & PostgreSQL/H2 DataSource
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:ksp_shodhana;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
  jpa:
    database-platform: ${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: update
    show-sql: false

  # Flyway Migration Configuration
  flyway:
    enabled: false
    locations: classpath:db/migration

# === Catalyst Configuration ===
catalyst:
  project-id: ${CATALYST_PROJECT_ID:}
  environment: ${CATALYST_ENV:development}

# === AI Service Configuration ===
ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:8000}
  timeout-ms: ${AI_SERVICE_TIMEOUT:30000}

# === CORS Configuration ===
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"

# === Logging ===
logging:
  level:
    com.ksp.shodhana: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
